version: '3.8'

services:
  app:
    build: .
    container_name: toolkit-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/toolkit
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mongodb
      - redis
    networks:
      - toolkit-network

  nginx:
    image: nginx:alpine
    container_name: toolkit-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - toolkit-network

  mongodb:
    image: mongo:6
    container_name: toolkit-mongodb-prod
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_prod_data:/data/db
    networks:
      - toolkit-network

  redis:
    image: redis:7-alpine
    container_name: toolkit-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_prod_data:/data
    networks:
      - toolkit-network

volumes:
  mongodb_prod_data:
  redis_prod_data:

networks:
  toolkit-network:
    driver: bridge
