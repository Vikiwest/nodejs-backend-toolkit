version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: toolkit-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - toolkit-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: toolkit-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - toolkit-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: toolkit-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - toolkit-network

  postgres:
    image: postgres:15
    container_name: toolkit-postgres
    environment:
      POSTGRES_DB: toolkit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - toolkit-network

  redis:
    image: redis:7-alpine
    container_name: toolkit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - toolkit-network

  app:
    build: .
    container_name: toolkit-app
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9229:9229" # Debug
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/toolkit?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/toolkit
    depends_on:
      - mongodb
      - redis
      - elasticsearch
      - postgres
    networks:
      - toolkit-network
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    command: npm run dev

  nginx:
    image: nginx:alpine
    container_name: toolkit-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - toolkit-network

networks:
  toolkit-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  postgres_data:

  redis:
    image: redis:7-alpine
    container_name: toolkit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - toolkit-network

  app:
    build: .
    container_name: toolkit-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/toolkit?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mongodb
      - redis
    networks:
      - toolkit-network
    volumes:
      - ./logs:/app/logs

networks:
  toolkit-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data: